<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    font-family: Arial;
}

/* canvas */
canvas {
    display: block;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    z-index: 5;
}

/* overlays */
#message, #gameover {
    display: none;
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 650px;
    text-align: center;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
}

/* floating hearts background */
.heart-float {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.7;
    z-index: 1;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* win flash */
#flash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
}

/* buttons */
button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="flash"></div>

<div id="ui">Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<div id="message">
<h2>🎉 You unlocked your surprise 💖</h2>
<p>
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎉🎂🎈🎊🎁🍾🪅🪩 ✨✨✨<br><br>

Tanda mo naaaaaa! Char lang 🤭<br><br>

But seriously... (your full message here) 💖
</p>
</div>

<div id="gameover">
<h2>💀 Ouch! Try Again 😅</h2>
<button onclick="resetGame()">Try Again</button>
</div>

<script>
let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

/* INIT CANVAS */
function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

/* GAME INIT */
function init() {
    player = { x: 50, y: 300, dy: 0, onGround: false };

    hearts = [
        {x: 200, y: 300},
        {x: 400, y: 250},
        {x: 600, y: 300},
        {x: 800, y: 200},
        {x: 1000, y: 300}
    ];

    spikes = [
        {x: 500, y: 330},
        {x: 900, y: 330}
    ];

    goal = { x: 1200, y: 300 };

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("gameover").style.display = "none";
    document.getElementById("message").style.display = "none";
}

/* CONTROLS */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* PLAYER */
function drawPlayer() {
    ctx.font = "30px Arial";
    ctx.fillText("👩", player.x, player.y);
}

/* GROUND */
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, 350, canvas.width, 50);
}

/* HEART BURST EFFECT */
function burst(x, y) {
    for (let i = 0; i < 6; i++) {
        ctx.fillText("💖", x + Math.random()*20, y + Math.random()*20);
    }
}

/* WIN FLASH */
function flashScreen() {
    let flash = document.getElementById("flash");
    flash.style.transition = "0.5s";
    flash.style.opacity = 0.7;

    setTimeout(() => {
        flash.style.opacity = 0;
    }, 500);
}

/* LOOP */
function loop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGround();

    // movement
    if (keys["ArrowRight"]) player.x += 5;
    if (keys["ArrowLeft"]) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= 320) {
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
    }

    // hearts
    hearts.forEach((h, i) => {
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < 20 && Math.abs(player.y - h.y) < 20) {
            burst(h.x, h.y); // ✨ effect
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    // spikes
    spikes.forEach(s => {
        ctx.fillText("💀", s.x, s.y);

        if (Math.abs(player.x - s.x) < 20 && Math.abs(player.y - s.y) < 20) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    ctx.fillText("🎁", goal.x, goal.y);

    // WIN
    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        flashScreen();
        document.getElementById("message").style.display = "block";
    }

    drawPlayer();
    requestAnimationFrame(loop);
}

/* RESTART */
function resetGame() {
    init();
    loop();
}

/* FLOATING HEARTS BACKGROUND */
function spawnHearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart-float";
        h.innerText = "💗";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(h);

        setTimeout(() => h.remove(), 6000);
    }, 400);
}

/* START */
window.onload = function () {
    initCanvas();
    init();
    loop();
    spawnHearts();
};
</script>

</body>
</html>
