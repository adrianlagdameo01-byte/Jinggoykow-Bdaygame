<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    font-family: Arial;
    touch-action: none;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#message, #gameover {
    display: none;
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 85%;
    max-width: 700px;
    text-align: center;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 20;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

button {
    padding: 12px 22px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: hotpink;
    color: white;
    cursor: pointer;
}

/* MOBILE CONTROLS */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    z-index: 15;
}

.ctrl {
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    font-size: 22px;
    text-align: center;
    line-height: 70px;
    user-select: none;
}
</style>
</head>

<body>

<div id="ui">❤️ Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<!-- MOBILE CONTROLS -->
<div id="controls">
    <div class="ctrl" id="left">⬅️</div>
    <div class="ctrl" id="jump">⬆️</div>
    <div class="ctrl" id="right">➡️</div>
</div>

<div id="message">
<h2>🎉 You unlocked your surprise 💖</h2>
<p>
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎂✨✨✨
<br><br>
Mahal na mahal kita ❤️
</p>
</div>

<div id="gameover">
<h2>💀 Try Again 😅</h2>
<button onclick="resetGame()">Try Again</button>
</div>

<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

let groundY;

/* INIT CANVAS */
function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 100;
}

/* INIT GAME */
function init() {

    player = {
        x: 50,
        y: groundY,
        dy: 0,
        onGround: false
    };

    hearts = [
        {x:200, y:groundY},
        {x:400, y:groundY-50},
        {x:600, y:groundY},
        {x:800, y:groundY-80},
        {x:1000, y:groundY}
    ];

    spikes = [
        {x:500, y:groundY},
        {x:900, y:groundY}
    ];

    goal = {
        x:1200,
        y:groundY
    };

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display = "none";
    document.getElementById("gameover").style.display = "none";
}

/* INPUT (KEYBOARD) */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* TOUCH CONTROLS */
document.getElementById("left").ontouchstart = () => keys["ArrowLeft"] = true;
document.getElementById("left").ontouchend = () => keys["ArrowLeft"] = false;

document.getElementById("right").ontouchstart = () => keys["ArrowRight"] = true;
document.getElementById("right").ontouchend = () => keys["ArrowRight"] = false;

document.getElementById("jump").ontouchstart = () => {
    if (player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }
};

/* DRAW PLAYER */
function drawPlayer() {

    ctx.fillStyle = "#ff69b4";
    ctx.fillRect(player.x, player.y - 35, 24, 35);

    ctx.fillStyle = "#f5cba7";
    ctx.beginPath();
    ctx.arc(player.x + 12, player.y - 45, 10, 0, Math.PI * 2);
    ctx.fill();
}

/* GROUND */
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, groundY, canvas.width, 100);
}

/* LOOP */
function loop() {

    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGround();

    /* movement */
    if (keys["ArrowRight"]) player.x += 5;
    if (keys["ArrowLeft"]) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    /* gravity */
    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= groundY) {
        player.y = groundY;
        player.dy = 0;
        player.onGround = true;
    }

    /* hearts */
    hearts.forEach((h, i) => {
        ctx.font = "28px Arial";
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < 25 && Math.abs(player.y - h.y) < 25) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* spikes */
    spikes.forEach(s => {
        ctx.fillText("💀", s.x, s.y);

        if (Math.abs(player.x - s.x) < 25 && Math.abs(player.y - s.y) < 25) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    /* goal */
    ctx.fillText("🎁", goal.x, goal.y);

    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    drawPlayer();

    requestAnimationFrame(loop);
}

/* RESET */
function resetGame() {
    init();
    loop();
}

/* START */
window.onload = function() {
    initCanvas();
    init();
    loop();
};

</script>

</body>
</html>
