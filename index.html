<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Game 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
}
canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    color: black;
}
</style>
</head>

<body>

<div id="ui">Loading game...</div>
<canvas id="game"></canvas>

<script>
window.onload = function () {

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let x = 50;

    function loop() {
        ctx.clearRect(0,0,canvas.width,canvas.height);

        // ground
        ctx.fillStyle = "green";
        ctx.fillRect(0, 350, canvas.width, 50);

        // player
        ctx.font = "30px Arial";
        ctx.fillText("👩", x, 320);

        x += 2;

        document.getElementById("ui").innerText = "Game Running...";

        requestAnimationFrame(loop);
    }

    loop();
};
</script>

</body>
</html>
