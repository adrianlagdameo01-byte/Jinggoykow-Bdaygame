<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    transition: background 2s;
    background: linear-gradient(#87CEEB, #ffffff);
}

canvas { display:block; }

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 5;
    font-size: 18px;
}

/* SCENES */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    text-align: center;
    padding: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
}

/* dialogue box */
#dialogue {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 15px;
    border-radius: 12px;
    max-width: 600px;
    z-index: 15;
    display: none;
}

/* fade effect */
.fade {
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen">
    <h1>💖 A Game Made Just for You 💖</h1>
    <p>A small world… built with love 🎮✨</p>
    <button onclick="startGame()">Start Journey 💕</button>
</div>

<!-- UI -->
<div id="ui">Hearts: <span id="score">0</span>/5</div>

<canvas id="game"></canvas>

<!-- DIALOGUE -->
<div id="dialogue"></div>

<!-- MESSAGE -->
<div id="message" class="screen" style="display:none;">
    <h2>🎉 You finished the journey 💖</h2>
    <p style="max-width:600px;">
        <span id="typed"></span>
    </p>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen" style="display:none;">
    <h2>💀 Try Again 😅</h2>
    <button onclick="resetGame()">Retry</button>
</div>

<!-- MUSIC -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3f7d7.mp3" type="audio/mp3">
</audio>

<script>
let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = false;
let time = 0;

/* STORY */
const story = [
"Once upon a time...",
"A girl entered a small world made just for her 💖",
"She didn’t know… someone was cheering for her all along.",
"Collect the hearts… and reach the gift 🎁"
];

/* FULL MESSAGE */
const finalMessage = `
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎉🎂🎈🎊🎁🍾🪅🪩 ✨✨✨

Tanda mo naaaaaa! Char lang 🤭 But seriously, I really wish I could spend this whole day with you...

Aside from good health and blessings, I’m always praying for your safety and happiness...

I know things haven’t been easy lately… but I believe in us and in God’s timing.

For now, I’ll wait.

But one thing’s sure—hihintayin kita.

Mahal na mahal kita. ❤️

—Maximow 🥰
`;

/* INIT */
function initCanvas(){
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function init(){
    player = {x:50,y:300,dy:0,onGround:false};

    hearts = [
        {x:200,y:300},
        {x:400,y:250},
        {x:600,y:300},
        {x:800,y:200},
        {x:1000,y:300}
    ];

    spikes = [{x:500,y:330},{x:900,y:330}];
    goal = {x:1200,y:300};

    score = 0;
    document.getElementById("score").innerText = score;

    document.getElementById("gameover").style.display="none";
    document.getElementById("message").style.display="none";
}

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* DRAW */
function drawPlayer(){
    ctx.font="30px Arial";
    ctx.fillText("👩‍🦰",player.x,player.y);
}

function ground(){
    ctx.fillStyle="green";
    ctx.fillRect(0,350,canvas.width,50);
}

/* DIALOGUE */
let storyIndex=0;
function showDialogue(text){
    let d=document.getElementById("dialogue");
    d.style.display="block";
    d.innerText=text;
    setTimeout(()=>d.style.display="none",2500);
}

/* TYPE EFFECT */
function typeText(text,i=0){
    if(i<text.length){
        document.getElementById("typed").innerHTML+=text[i];
        setTimeout(()=>typeText(text,i+1),20);
    }
}

/* GAME LOOP */
function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ground();

    // movement
    if(keys["ArrowRight"]) player.x+=5;
    if(keys["ArrowLeft"]) player.x-=5;
    if(keys["ArrowUp"] && player.onGround){
        player.dy=-12;
        player.onGround=false;
    }

    player.dy+=gravity;
    player.y+=player.dy;

    if(player.y>=320){
        player.y=320;
        player.dy=0;
        player.onGround=true;
    }

    // hearts
    hearts.forEach((h,i)=>{
        ctx.fillText("❤️",h.x,h.y);
        if(Math.abs(player.x-h.x)<20){
            hearts.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
        }
    });

    // spikes
    spikes.forEach(s=>{
        ctx.fillText("💀",s.x,s.y);
        if(Math.abs(player.x-s.x)<20){
            gameRunning=false;
            document.getElementById("gameover").style.display="flex";
        }
    });

    ctx.fillText("🎁",goal.x,goal.y);

    if(player.x>goal.x && score>=5){
        gameRunning=false;
        document.getElementById("message").style.display="flex";
        document.getElementById("typed").innerHTML="";
        typeText(finalMessage);
    }

    drawPlayer();
    requestAnimationFrame(loop);
}

/* START */
function startGame(){
    document.getElementById("intro").style.display="none";
    init();
    gameRunning=true;
    loop();
    document.getElementById("bgm").play();

    // story intro
    let i=0;
    let storyInterval=setInterval(()=>{
        showDialogue(story[i]);
        i++;
        if(i>=story.length) clearInterval(storyInterval);
    },2500);
}

/* RESET */
function resetGame(){
    init();
    gameRunning=true;
    loop();
}

/* INIT */
window.onload=function(){
    initCanvas();
};
</script>

</body>
</html>
