<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;
let clouds = [];

/* CANVAS */
function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    resize();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

/* INIT GAME */
function init() {

    player = {
        x: 50,
        y: canvas.height - 100,
        dy: 0,
        onGround: false
    };

    hearts = [
        {x:200, y:300},
        {x:400, y:250},
        {x:600, y:300},
        {x:800, y:220},
        {x:1000, y:300}
    ];

    spikes = [
        {x:500, y:330},
        {x:900, y:330}
    ];

    goal = { x:1200, y:300 };

    clouds = [
        {x:100, y:80},
        {x:350, y:120},
        {x:700, y:60},
        {x:1050, y:100}
    ];

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display = "none";
    document.getElementById("gameover").style.display = "none";
}

/* INPUT */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* TOUCH */
document.getElementById("left").ontouchstart = () => keys.left = true;
document.getElementById("left").ontouchend = () => keys.left = false;

document.getElementById("right").ontouchstart = () => keys.right = true;
document.getElementById("right").ontouchend = () => keys.right = false;

document.getElementById("jump").ontouchstart = () => {
    if (player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }
};

/* CLOUDS */
function drawClouds() {
    for (let c of clouds) {

        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(c.x, c.y, 25, 0, Math.PI * 2);
        ctx.arc(c.x + 25, c.y + 10, 30, 0, Math.PI * 2);
        ctx.arc(c.x + 55, c.y, 25, 0, Math.PI * 2);
        ctx.fill();

        c.x -= 0.3;

        if (c.x < -100) {
            c.x = canvas.width + 100;
        }
    }
}

/* PLAYER (LEG FIXED) */
function drawPlayer() {

    let bounce = Math.sin(Date.now() * 0.015) * 2;

    let px = player.x;
    let py = player.y + bounce;

    ctx.fillStyle = "#ff69b4";
    ctx.fillRect(px, py - 35, 24, 35);

    ctx.fillStyle = "#f5cba7";
    ctx.beginPath();
    ctx.arc(px + 12, py - 45, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#5d4037";
    ctx.beginPath();
    ctx.arc(px + 12, py - 48, 11, Math.PI, 0);
    ctx.fill();

    /* 👣 LEGS (RESTORED) */
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;

    let legMove = Math.sin(Date.now() * 0.02) * 4;

    ctx.beginPath();
    ctx.moveTo(px + 8, py);
    ctx.lineTo(px + 8 - legMove, py + 15);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(px + 16, py);
    ctx.lineTo(px + 16 + legMove, py + 15);
    ctx.stroke();
}

/* GROUND */
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
}

/* LOOP */
function loop() {

    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawClouds();
    drawGround();

    /* MOVEMENT */
    if (keys["ArrowRight"] || keys.right) player.x += 5;
    if (keys["ArrowLeft"] || keys.left) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    /* GRAVITY */
    player.dy += gravity;
    player.y += player.dy;

    let groundY = canvas.height - 50;

    if (player.y >= groundY - 30) {
        player.y = groundY - 30;
        player.dy = 0;
        player.onGround = true;
    }

    /* HEARTS */
    hearts.forEach((h, i) => {

        ctx.font = "28px Arial";
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < 25 && Math.abs(player.y - h.y) < 25) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* SPIKES */
    spikes.forEach(s => {

        ctx.font = "30px Arial";
        ctx.fillText("💀", s.x, s.y);

        if (Math.abs(player.x - s.x) < 25 && Math.abs(player.y - s.y) < 25) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    /* GIFT */
    ctx.font = "32px Arial";
    ctx.fillText("🎁", goal.x, goal.y);

    /* WIN */
    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    drawPlayer();
    requestAnimationFrame(loop);
}

/* RESET */
function resetGame() {
    init();
    loop();
}

/* START */
window.onload = function () {
    initCanvas();
    init();
    loop();
};

window.addEventListener("resize", resize);

</script>
