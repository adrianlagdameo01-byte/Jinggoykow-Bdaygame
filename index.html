<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#87CEEB, #ffffff);
}

/* canvas */
canvas {
    display: block;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 5;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    text-align: center;
    padding: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
}

/* joystick */
#controls {
    position: absolute;
    bottom: 30px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 10;
}

.ctrl {
    font-size: 30px;
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 50%;
    user-select: none;
}
</style>
</head>

<body>

<div id="intro" class="screen">
    <h1>💖 A Game for Jinggoykow 💖</h1>
    <p>
        Once upon a time...<br>
        someone built a small world just for you 🎮✨
    </p>
    <button onclick="startGame()">Press Start 💕</button>
</div>

<div id="ui">Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<div id="message" class="screen" style="display:none;">
<h2>🎉 You unlocked your message 💖</h2>
<p style="max-width:600px; line-height:1.5;">
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎉🎂🎈🎊🎁🍾🪅🪩 ✨✨✨<br><br>

(Paste your full message here 💖)
</p>
</div>

<div id="gameover" class="screen" style="display:none;">
<h2>💀 Oops! Try Again 😅</h2>
<button onclick="resetGame()">Try Again</button>
</div>

<!-- mobile controls -->
<div id="controls">
    <div class="ctrl" onmousedown="keys['ArrowLeft']=true" onmouseup="keys['ArrowLeft']=false">⬅️</div>
    <div class="ctrl" onmousedown="keys['ArrowRight']=true" onmouseup="keys['ArrowRight']=false">➡️</div>
    <div class="ctrl" onmousedown="jump()">⬆️</div>
</div>

<!-- music -->
<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3f7d7.mp3?filename=romantic-112191.mp3" type="audio/mp3">
</audio>

<script>
let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = false;

function initCanvas(){
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function init(){
    player = {x:50,y:300,dy:0,onGround:false};

    hearts = [
        {x:200,y:300},
        {x:400,y:250},
        {x:600,y:300},
        {x:800,y:200},
        {x:1000,y:300}
    ];

    spikes = [
        {x:500,y:330},
        {x:900,y:330}
    ];

    goal = {x:1200,y:300};

    score = 0;
    document.getElementById("score").innerText = score;

    document.getElementById("gameover").style.display = "none";
    document.getElementById("message").style.display = "none";
}

document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function jump(){
    if(player.onGround){
        player.dy = -12;
        player.onGround = false;
    }
}

function draw(){
    ctx.font = "30px Arial";
    ctx.fillText("👩", player.x, player.y);
}

function ground(){
    ctx.fillStyle="green";
    ctx.fillRect(0,350,canvas.width,50);
}

function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ground();

    if(keys["ArrowRight"]) player.x+=5;
    if(keys["ArrowLeft"]) player.x-=5;

    if(keys["ArrowUp"]) jump();

    player.dy += gravity;
    player.y += player.dy;

    if(player.y>=320){
        player.y=320;
        player.dy=0;
        player.onGround=true;
    }

    hearts.forEach((h,i)=>{
        ctx.fillText("❤️",h.x,h.y);
        if(Math.abs(player.x-h.x)<20 && Math.abs(player.y-h.y)<20){
            hearts.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
        }
    });

    spikes.forEach(s=>{
        ctx.fillText("💀",s.x,s.y);
        if(Math.abs(player.x-s.x)<20 && Math.abs(player.y-s.y)<20){
            gameRunning=false;
            document.getElementById("gameover").style.display="flex";
        }
    });

    ctx.fillText("🎁",goal.x,goal.y);

    if(player.x>goal.x && score>=5){
        gameRunning=false;
        document.getElementById("message").style.display="flex";
    }

    draw();
    requestAnimationFrame(loop);
}

/* START GAME */
function startGame(){
    document.getElementById("intro").style.display="none";
    init();
    gameRunning=true;
    loop();

    // music
    document.getElementById("bgm").play();
}

/* RESET */
function resetGame(){
    init();
    gameRunning=true;
    loop();
}

/* init */
window.onload=function(){
    initCanvas();
};
</script>

</body>
</html>
