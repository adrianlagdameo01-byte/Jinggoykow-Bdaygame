<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true; // ✅ control game state

function init() {
    player = { x: 50, y: 300, dy: 0, onGround: false };
    hearts = [
        {x: 200, y: 300},
        {x: 400, y: 250},
        {x: 600, y: 300},
        {x: 800, y: 200},
        {x: 1000, y: 300}
    ];
    spikes = [
        {x: 500, y: 330},
        {x: 900, y: 330}
    ];
    goal = { x: 1200, y: 300 };
    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("gameover").style.display = "none";
    document.getElementById("message").style.display = "none";
}

init();

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function drawPlayer() {
    ctx.font = "30px Arial";
    ctx.fillText("👩", player.x, player.y);
}

function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, 350, canvas.width, 50);
}

function update() {
    if (!gameRunning) return; // ✅ STOP GAME

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGround();

    // Movement
    if (keys["ArrowRight"]) player.x += 5;
    if (keys["ArrowLeft"]) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= 320) {
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
    }

    // Hearts
    hearts.forEach((h, i) => {
        ctx.fillText("❤️", h.x, h.y);
        if (Math.abs(player.x - h.x) < 20 && Math.abs(player.y - h.y) < 20) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    // Spikes
    spikes.forEach(s => {
        ctx.fillText("💀", s.x, s.y);
        if (Math.abs(player.x - s.x) < 20 && Math.abs(player.y - s.y) < 20) {
            gameRunning = false; // ✅ STOP
            document.getElementById("gameover").style.display = "block";
        }
    });

    // Goal
    ctx.fillText("🎁", goal.x, goal.y);

    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    drawPlayer();
    requestAnimationFrame(update);
}

// ✅ FIXED RESET
function resetGame() {
    init();
    update(); // restart loop
}

update();
</script>
