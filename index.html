<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #fff);
    font-family: Arial;
    touch-action: none;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#message, #gameover, #rotate {
    display: none;
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 650px;
    width: 85%;
    text-align: center;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 20;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: hotpink;
    color: white;
}

/* mobile controls */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    z-index: 15;
}

.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,105,180,0.8);
    color: white;
    font-size: 24px;
    border: none;
}
</style>
</head>

<body>

<div id="ui">❤️ Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<div id="controls">
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="jump">⬆️</button>
    <button class="btn" id="right">➡️</button>
</div>

<div id="rotate">
<h2>📱 Rotate Device</h2>
<p>Please rotate to landscape 💖</p>
</div>

<div id="message">
<h2>🎉 Surprise Unlocked 💖</h2>
<p>Happy Birthday Jinggoykow ❤️</p>
</div>

<div id="gameover">
<h2>💀 Try Again</h2>
<button onclick="resetGame()">Restart</button>
</div>

<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

let clouds = [];
let groundY;

/* CANVAS */
function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

/* INIT GAME */
function init() {

    groundY = canvas.height * 0.78;

    player = {
        x: 50,
        y: groundY,
        dy: 0,
        onGround: false
    };

    hearts = [
        {x:200,y:groundY-60},
        {x:400,y:groundY-120},
        {x:600,y:groundY-60},
        {x:800,y:groundY-140},
        {x:1000,y:groundY-60}
    ];

    spikes = [
        {x:500,y:groundY-10},
        {x:900,y:groundY-10}
    ];

    goal = { x:1200, y:groundY-70 };

    clouds = [
        {x:100,y:80},
        {x:300,y:120},
        {x:600,y:70},
        {x:900,y:100},
        {x:1200,y:60}
    ];

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
}

/* INPUT */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* TOUCH */
document.getElementById("left").ontouchstart = () => keys["ArrowLeft"] = true;
document.getElementById("left").ontouchend = () => keys["ArrowLeft"] = false;

document.getElementById("right").ontouchstart = () => keys["ArrowRight"] = true;
document.getElementById("right").ontouchend = () => keys["ArrowRight"] = false;

document.getElementById("jump").ontouchstart = () => {
    if (player.onGround) player.dy = -12;
};

/* CLOUDS */
function drawClouds() {
    for (let c of clouds) {
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(c.x,c.y,25,0,Math.PI*2);
        ctx.arc(c.x+25,c.y+10,30,0,Math.PI*2);
        ctx.arc(c.x+55,c.y,25,0,Math.PI*2);
        ctx.fill();

        c.x -= 0.3;
        if (c.x < -100) {
            c.x = canvas.width + 100;
            c.y = 50 + Math.random()*120;
        }
    }
}

/* PLAYER */
function drawPlayer() {

    let bounce = Math.sin(Date.now()*0.015)*2;
    let y = player.y - 50 + bounce;

    ctx.fillStyle = "#ff69b4";
    ctx.fillRect(player.x,y,24,35);

    ctx.fillStyle = "#f5cba7";
    ctx.beginPath();
    ctx.arc(player.x+12,y-10,10,0,Math.PI*2);
    ctx.fill();
}

/* GROUND */
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0,groundY+20,canvas.width,canvas.height);
}

/* LOOP */
function loop() {

    if (!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawClouds();
    drawGround();

    if (keys["ArrowRight"]) player.x += 5;
    if (keys["ArrowLeft"]) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= groundY) {
        player.y = groundY;
        player.dy = 0;
        player.onGround = true;
    }

    /* HEARTS */
    hearts.forEach((h,i)=>{
        ctx.fillText("❤️",h.x,h.y);
        if (Math.abs(player.x-h.x)<25 && Math.abs(player.y-h.y)<50){
            hearts.splice(i,1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* SPIKES */
    spikes.forEach(s=>{
        ctx.fillText("💀",s.x,s.y);
        if (Math.abs(player.x-s.x)<25 && Math.abs(player.y-s.y)<50){
            gameRunning = false;
            document.getElementById("gameover").style.display="block";
        }
    });

    ctx.fillText("🎁",goal.x,goal.y);

    if (player.x > goal.x && score >= 5){
        gameRunning = false;
        document.getElementById("message").style.display="block";
    }

    drawPlayer();
    requestAnimationFrame(loop);
}

/* RESET */
function resetGame(){
    init();
    loop();
}

/* ORIENTATION */
function checkRotate(){
    document.getElementById("rotate").style.display =
    window.innerHeight > window.innerWidth ? "block" : "none";
}

/* START */
window.onload = function(){
    initCanvas();
    init();
    checkRotate();
    loop();
};

window.onresize = function(){
    initCanvas();
    init();
    checkRotate();
};

</script>

</body>
</html>
