<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#87CEEB, #ffffff);
    touch-action: none; /* 🚨 prevents scroll on mobile */
}

canvas {
    display: block;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    z-index: 5;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
    padding: 20px;
}

/* buttons */
button {
    padding: 12px 20px;
    font-size: 16px;
    background: hotpink;
    border: none;
    color: white;
    border-radius: 10px;
}

/* MOBILE CONTROLS */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    z-index: 15;
}

.ctrl {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    user-select: none;
}
</style>
</head>

<body>

<div id="ui">❤️ <span id="score">0</span>/5</div>

<canvas id="game"></canvas>

<div id="message" class="screen">
    <h2>🎉 You unlocked your message 💖</h2>
    <p style="max-width:600px;">
        ✨ Happy Birthday Jinggoykow 🥳💖<br><br>
        (Paste your full message here)
    </p>
</div>

<div id="gameover" class="screen">
    <h2>💀 Try Again</h2>
    <button onclick="resetGame()">Retry</button>
</div>

<!-- MOBILE BUTTONS -->
<div id="controls">
    <div class="ctrl" id="left">⬅️</div>
    <div class="ctrl" id="jump">⬆️</div>
    <div class="ctrl" id="right">➡️</div>
</div>

<script>
let canvas, ctx;
let player, hearts, spikes, goal;
let score = 0;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

/* INIT */
function initCanvas(){
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function init(){
    player = {x:50,y:300,dy:0,onGround:false};

    hearts = [
        {x:200,y:300},
        {x:400,y:250},
        {x:600,y:300},
        {x:800,y:200},
        {x:1000,y:300}
    ];

    spikes = [
        {x:500,y:330},
        {x:900,y:330}
    ];

    goal = {x:1200,y:300};

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display="none";
    document.getElementById("gameover").style.display="none";
}

/* INPUT (keyboard + touch) */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* TOUCH CONTROLS */
function bindHold(id, key){
    let el = document.getElementById(id);

    el.addEventListener("touchstart", e=>{
        e.preventDefault();
        keys[key] = true;
    });

    el.addEventListener("touchend", e=>{
        keys[key] = false;
    });

    el.addEventListener("mousedown", ()=>{
        keys[key] = true;
    });

    el.addEventListener("mouseup", ()=>{
        keys[key] = false;
    });
}

bindHold("left","ArrowLeft");
bindHold("right","ArrowRight");

document.getElementById("jump").addEventListener("touchstart", jump);
document.getElementById("jump").addEventListener("mousedown", jump);

function jump(){
    if(player.onGround){
        player.dy = -11;
        player.onGround = false;
    }
}

/* DRAW */
function draw(){
    ctx.font="30px Arial";
    ctx.fillText("👩",player.x,player.y);
}

function ground(){
    ctx.fillStyle="green";
    ctx.fillRect(0,350,canvas.width,50);
}

/* LOOP */
function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ground();

    if(keys["ArrowRight"]) player.x += 5;
    if(keys["ArrowLeft"]) player.x -= 5;

    player.dy += gravity;
    player.y += player.dy;

    if(player.y >= 320){
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
    }

    /* hearts */
    for(let i=0;i<hearts.length;i++){
        let h = hearts[i];
        ctx.fillText("❤️",h.x,h.y);

        if(Math.abs(player.x-h.x)<20){
            hearts.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
            i--;
        }
    }

    /* spikes */
    for(let s of spikes){
        ctx.fillText("💀",s.x,s.y);

        if(Math.abs(player.x-s.x)<20){
            gameRunning=false;
            document.getElementById("gameover").style.display="flex";
        }
    }

    ctx.fillText("🎁",goal.x,goal.y);

    if(score >= 5){
        gameRunning=false;
        document.getElementById("message").style.display="flex";
    }

    draw();
    requestAnimationFrame(loop);
}

/* RESET */
function resetGame(){
    init();
    loop();
}

/* START */
window.onload = function(){
    initCanvas();
    init();
    loop();
};
</script>

</body>
</html>
