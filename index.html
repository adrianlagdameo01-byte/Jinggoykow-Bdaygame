<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;
let clouds = [];

/* WORLD SCALE SYSTEM */
let scale = 1;
let baseWidth = 1400;
let baseHeight = 450;

/* INIT CANVAS */
function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    resize();
}

/* RESPONSIVE + SCALE FIX */
function resize() {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // scale based on width (mobile-friendly)
    scale = canvas.width / baseWidth;

    if (scale < 0.6) scale = 0.6; // prevent too small
    if (scale > 1) scale = 1;
}

/* SCALE HELPER */
function S(v) {
    return v * scale;
}

/* INIT GAME */
function init() {

    player = {
        x: S(50),
        y: S(300),
        dy: 0,
        onGround: false
    };

    hearts = [
        {x:S(200), y:S(300)},
        {x:S(400), y:S(250)},
        {x:S(600), y:S(300)},
        {x:S(800), y:S(220)},
        {x:S(1000), y:S(300)}
    ];

    spikes = [
        {x:S(500), y:S(330)},
        {x:S(900), y:S(330)}
    ];

    goal = {
        x:S(1200),
        y:S(300)
    };

    clouds = [
        {x:S(100), y:S(80)},
        {x:S(350), y:S(120)},
        {x:S(700), y:S(60)},
        {x:S(1050), y:S(100)},
        {x:S(1400), y:S(70)}
    ];

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display = "none";
    document.getElementById("gameover").style.display = "none";
}

/* TOUCH CONTROLS */
document.getElementById("left").ontouchstart = () => keys["left"] = true;
document.getElementById("left").ontouchend = () => keys["left"] = false;

document.getElementById("right").ontouchstart = () => keys["right"] = true;
document.getElementById("right").ontouchend = () => keys["right"] = false;

document.getElementById("jump").ontouchstart = () => {
    if (player.onGround) {
        player.dy = -12 * scale;
        player.onGround = false;
    }
};

/* KEYBOARD */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* CLOUDS */
function drawClouds() {

    for (let c of clouds) {

        ctx.fillStyle = "rgba(255,255,255,0.9)";

        ctx.beginPath();
        ctx.arc(c.x, c.y, S(25), 0, Math.PI * 2);
        ctx.arc(c.x + S(25), c.y + S(10), S(30), 0, Math.PI * 2);
        ctx.arc(c.x + S(55), c.y, S(25), 0, Math.PI * 2);
        ctx.arc(c.x + S(25), c.y - S(10), S(22), 0, Math.PI * 2);
        ctx.fill();

        c.x -= 0.35 * scale;

        if (c.x < -200) {
            c.x = canvas.width + 200;
        }
    }
}

/* PLAYER (FIXED + LEG ANIMATION RESTORED) */
function drawPlayer() {

    let bounce = Math.sin(Date.now() * 0.015) * S(2);

    let px = player.x;
    let py = player.y + bounce;

    // BODY
    ctx.fillStyle = "#ff69b4";
    ctx.fillRect(px, py - S(35), S(24), S(35));

    // HEAD
    ctx.fillStyle = "#f5cba7";
    ctx.beginPath();
    ctx.arc(px + S(12), py - S(45), S(10), 0, Math.PI * 2);
    ctx.fill();

    // HAIR
    ctx.fillStyle = "#5d4037";
    ctx.beginPath();
    ctx.arc(px + S(12), py - S(48), S(11), Math.PI, 0);
    ctx.fill();

    // SKIRT
    ctx.fillStyle = "#ff1493";
    ctx.beginPath();
    ctx.moveTo(px + S(2), py - S(5));
    ctx.lineTo(px + S(22), py - S(5));
    ctx.lineTo(px + S(12), py + S(8));
    ctx.fill();

    /* 👣 MOVING LEGS (RESTORED + FIXED SCALE) */
    ctx.strokeStyle = "#000";
    ctx.lineWidth = S(2);

    let legMove = Math.sin(Date.now() * 0.02) * S(4);

    ctx.beginPath();
    ctx.moveTo(px + S(8), py);
    ctx.lineTo(px + S(8) - legMove, py + S(15));
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(px + S(16), py);
    ctx.lineTo(px + S(16) + legMove, py + S(15));
    ctx.stroke();

    // ARMS
    ctx.beginPath();
    ctx.moveTo(px + S(2), py - S(20));
    ctx.lineTo(px - S(8), py - S(10));
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(px + S(22), py - S(20));
    ctx.lineTo(px + S(32), py - S(10));
    ctx.stroke();
}

/* GROUND */
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, canvas.height - S(50), canvas.width, S(50));
}

/* LOOP */
function loop() {

    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawClouds();
    drawGround();

    /* MOVEMENT */
    if (keys["ArrowRight"] || keys["right"]) player.x += 5 * scale;
    if (keys["ArrowLeft"] || keys["left"]) player.x -= 5 * scale;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12 * scale;
        player.onGround = false;
    }

    /* GRAVITY */
    player.dy += gravity * scale;
    player.y += player.dy;

    let groundY = canvas.height - S(50);

    if (player.y >= groundY - S(30)) {
        player.y = groundY - S(30);
        player.dy = 0;
        player.onGround = true;
    }

    /* HEARTS */
    hearts.forEach((h, i) => {

        ctx.font = `${S(28)}px Arial`;
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < S(25) && Math.abs(player.y - h.y) < S(25)) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* SPIKES */
    spikes.forEach(s => {

        ctx.font = `${S(30)}px Arial`;
        ctx.fillText("💀", s.x, s.y);

        if (Math.abs(player.x - s.x) < S(25) && Math.abs(player.y - s.y) < S(25)) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    /* GIFT */
    ctx.font = `${S(32)}px Arial`;
    ctx.fillText("🎁", goal.x, goal.y);

    /* WIN */
    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    drawPlayer();
    requestAnimationFrame(loop);
}

/* RESET */
function resetGame() {
    init();
    loop();
}

/* START */
window.onload = function() {
    initCanvas();
    init();
    loop();
};

window.addEventListener("resize", () => {
    resize();
    init();
});

</script>
