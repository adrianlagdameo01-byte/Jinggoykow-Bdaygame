<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    font-family: Arial;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#message, #gameover {
    display: none;
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border-radius: 20px;
    max-width: 700px;
    width: 85%;
    text-align: center;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 20;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

button {
    padding: 12px 22px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: hotpink;
    color: white;
    cursor: pointer;
}

#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    z-index: 30;
    padding: 0 20px;
    box-sizing: border-box;
}

.ctrl {
    width: 70px;
    height: 70px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: white;
    user-select: none;
}
</style>
</head>

<body>

<div id="ui">❤️ Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<div id="message">
<h2>🎉 You unlocked your surprise 💖</h2>
<p style="line-height:1.6;">
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎉🎂🎈🎊🎁🍾🪅🪩 ✨✨✨
<br><br>
Tanda mo naaaaaa! Char lang 🤭
<br><br>
—Maximow 🥰
</p>
<br>
<button onclick="resetGame()">🔁 Play Again</button>
</div>

<div id="gameover">
<h2>💀 Ouch! Try Again 😅</h2>
<button onclick="resetGame()">Try Again</button>
</div>

<div id="controls">
    <div class="ctrl" id="left">⬅️</div>
    <div class="ctrl" id="jump">⬆️</div>
    <div class="ctrl" id="right">➡️</div>
</div>

<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

let clouds = [];
let birds = [];
let dog = { x: 0, y: 0 };

const BASE_W = 1400;
const BASE_H = 450;
let scale = 1;

function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    scale = Math.min(canvas.width / BASE_W, canvas.height / BASE_H);
}

function init() {

    player = { x: 50, y: 300, dy: 0, onGround: false };

    dog = { x: 20, y: 320, dir: 1 };

    hearts = [
        {x:200, y:300},
        {x:400, y:250},
        {x:600, y:300},
        {x:800, y:220},
        {x:1000, y:300}
    ];

    spikes = [
        {x:500, y:330},
        {x:900, y:330}
    ];

    goal = { x:1200, y:300 };

    clouds = [
        {x:100, y:80, r:20},
        {x:350, y:120, r:35},
        {x:700, y:60, r:25},
        {x:1050, y:100, r:40},
        {x:1400, y:70, r:18}
    ];

    birds = [
        {x:200, y:120, f:0},
        {x:600, y:90, f:1},
        {x:1000, y:140, f:2}
    ];

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display = "none";
    document.getElementById("gameover").style.display = "none";
}

/* INPUT */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.getElementById("left").addEventListener("touchstart", () => keys["ArrowLeft"] = true);
document.getElementById("left").addEventListener("touchend", () => keys["ArrowLeft"] = false);

document.getElementById("right").addEventListener("touchstart", () => keys["ArrowRight"] = true);
document.getElementById("right").addEventListener("touchend", () => keys["ArrowRight"] = false);

document.getElementById("jump").addEventListener("touchstart", () => keys["ArrowUp"] = true);
document.getElementById("jump").addEventListener("touchend", () => keys["ArrowUp"] = false);

function loop() {

    if (!gameRunning) return;

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale,0,0,scale,0,0);

    /* CLOUDS */
    for (let c of clouds) {
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.arc(c.x + c.r, c.y + 10, c.r + 10, 0, Math.PI * 2);
        ctx.arc(c.x + c.r*2, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();

        c.x -= 0.3;
        if (c.x < -150) c.x = BASE_W + 200;
    }

    /* MOVEMENT DIR */
    let dir = 0;
    if (keys["ArrowRight"]) { player.x += 5; dir = 1; }
    if (keys["ArrowLeft"]) { player.x -= 5; dir = -1; }

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= 320) {
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
    }

    /* DOG (TURN + MOUTH + WALK) */
    dog.x += (player.x - dog.x - 30) * 0.05;
    dog.dir = (player.x < dog.x) ? -1 : 1;

    let walk = Math.sin(Date.now()*0.02) * 3;
    let tail = Math.sin(Date.now()*0.05) * 6;
    let mouth = Math.sin(Date.now()*0.08) * 2;

    let dx = dog.x;
    let dy = dog.y;

    ctx.save();
    ctx.translate(dx, dy);
    ctx.scale(dog.dir, 1);

    ctx.fillStyle = "#d9d9d9";

    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();

    // head
    ctx.beginPath();
    ctx.arc(14, -6, 7, 0, Math.PI*2);
    ctx.fill();

    // mouth (moving)
    ctx.strokeStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(18, -2);
    ctx.lineTo(18, -2 + mouth);
    ctx.stroke();

    // legs
    ctx.strokeStyle = "#bbb";
    ctx.lineWidth = 2;
    for (let i = -6; i <= 8; i += 4) {
        ctx.beginPath();
        ctx.moveTo(i, 8);
        ctx.lineTo(i, 8 + walk);
        ctx.stroke();
    }

    // tail
    ctx.beginPath();
    ctx.moveTo(-14, 0);
    ctx.quadraticCurveTo(-20, -5 + tail, -22, -2);
    ctx.stroke();

    ctx.restore();

    /* HEARTS */
    hearts.forEach((h, i) => {
        ctx.font = "28px Arial";
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < 25 && Math.abs(player.y - h.y) < 25) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* SPIKES */
    spikes.forEach(s => {
        ctx.font = "30px Arial";
        ctx.fillText("💀", s.x, s.y);

        let dx2 = player.x - s.x;
        let dy2 = player.y - s.y;
        if (Math.sqrt(dx2*dx2 + dy2*dy2) < 30) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    ctx.font = "32px Arial";
    ctx.fillText("🎁", goal.x, goal.y);

    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    /* PRINCESS (HAIR + ARMS + MOUTH + BACKPACK + SHOES) */

    let bounce = Math.sin(Date.now()*0.015)*2;
    let armMove = Math.sin(Date.now()*0.03)*6;
    let mouthMove = Math.sin(Date.now()*0.1)*2;

    let px = player.x;
    let py = player.y + bounce;

    ctx.save();
    ctx.translate(px, py);
    ctx.scale(dir === -1 ? -1 : 1, 1);

    // backpack
    ctx.fillStyle = "#7ec8e3";
    ctx.fillRect(-10, -25, 10, 18);

    // hair
    ctx.fillStyle = "#3b2a1f";
    ctx.beginPath();
    ctx.moveTo(12, -50);
    ctx.quadraticCurveTo(-25, -20, -15, 35);
    ctx.quadraticCurveTo(12, 50, 35, 10);
    ctx.fill();

    // dress
    ctx.fillStyle = "#ff4fa3";
    ctx.beginPath();
    ctx.moveTo(12, -20);
    ctx.lineTo(-25, 30);
    ctx.lineTo(45, 30);
    ctx.fill();

    // body
    ctx.fillStyle = "#f5cba7";
    ctx.fillRect(6, -30, 12, 12);

    // head
    ctx.beginPath();
    ctx.arc(12, -45, 12, 0, Math.PI*2);
    ctx.fill();

    // mouth (moving)
    ctx.strokeStyle = "#000";
    ctx.beginPath();
    ctx.moveTo(10, -40);
    ctx.lineTo(14, -40 + mouthMove);
    ctx.stroke();

    // arms
    ctx.strokeStyle = "#f5cba7";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(6, -22);
    ctx.lineTo(-10, -10 + armMove);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(18, -22);
    ctx.lineTo(34, -10 - armMove);
    ctx.stroke();

    // legs
    ctx.beginPath();
    ctx.moveTo(10, 25);
    ctx.lineTo(6, 42);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(16, 25);
    ctx.lineTo(20, 42);
    ctx.stroke();

    // shoes
    ctx.fillStyle = "#333";
    ctx.fillRect(4, 42, 6, 4);
    ctx.fillRect(18, 42, 6, 4);

    ctx.restore();

    requestAnimationFrame(loop);
}

function resetGame() {
    init();
    loop();
}

window.onload = function() {
    initCanvas();
    init();
    loop();
};

</script>

</body>
</html>
