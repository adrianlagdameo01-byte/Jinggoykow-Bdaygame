<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Jinggoykow 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    font-family: Arial;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#message, #gameover {
    display: none;
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border-radius: 20px;
    max-width: 700px;
    width: 85%;
    text-align: center;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 20;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

button {
    padding: 12px 22px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: hotpink;
    color: white;
    cursor: pointer;
}

#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    z-index: 30;
    padding: 0 20px;
    box-sizing: border-box;
}

.ctrl {
    width: 70px;
    height: 70px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: white;
    user-select: none;
}
</style>
</head>

<body>

<div id="ui">❤️ Hearts: <span id="score">0</span> / 5</div>

<canvas id="game"></canvas>

<div id="message">
<h2>🎉 You unlocked your surprise 💖</h2>
<p style="line-height:1.6;">
✨✨✨ Happy 35th Birthday, Jinggoykow! 🥳🎉🎂🎈🎊🎁🍾🪅🪩 ✨✨✨
<br><br>
Tanda mo naaaaaa! Char lang 🤭
<br><br>
—Maximow 🥰
</p>
<br>
<button onclick="resetGame()">🔁 Play Again</button>
</div>

<div id="gameover">
<h2>💀 Ouch! Try Again 😅</h2>
<button onclick="resetGame()">Try Again</button>
</div>

<div id="controls">
    <div class="ctrl" id="left">⬅️</div>
    <div class="ctrl" id="jump">⬆️</div>
    <div class="ctrl" id="right">➡️</div>
</div>

<script>

let canvas, ctx;
let player, hearts, spikes, goal, score;
let gravity = 0.6;
let keys = {};
let gameRunning = true;

let clouds = [];
let birds = [];
let dog = { x: 0, y: 0 };

const BASE_W = 1400;
const BASE_H = 450;
let scale = 1;

function initCanvas() {
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    scale = Math.min(canvas.width / BASE_W, canvas.height / BASE_H);
}

function init() {

    player = { x: 50, y: 300, dy: 0, onGround: false };

    dog = { x: 20, y: 320, step: 0 };

    hearts = [
        {x:200, y:300},
        {x:400, y:250},
        {x:600, y:300},
        {x:800, y:220},
        {x:1000, y:300}
    ];

    spikes = [
        {x:500, y:330},
        {x:900, y:330}
    ];

    goal = { x:1200, y:300 };

    clouds = [
        {x:100, y:80, r:20},
        {x:350, y:120, r:35},
        {x:700, y:60, r:25},
        {x:1050, y:100, r:40},
        {x:1400, y:70, r:18}
    ];

    birds = [
        {x:200, y:120, f:0},
        {x:600, y:90, f:1},
        {x:1000, y:140, f:2}
    ];

    score = 0;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("message").style.display = "none";
    document.getElementById("gameover").style.display = "none";
}

/* INPUT */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.getElementById("left").addEventListener("touchstart", () => keys["ArrowLeft"] = true);
document.getElementById("left").addEventListener("touchend", () => keys["ArrowLeft"] = false);

document.getElementById("right").addEventListener("touchstart", () => keys["ArrowRight"] = true);
document.getElementById("right").addEventListener("touchend", () => keys["ArrowRight"] = false);

document.getElementById("jump").addEventListener("touchstart", () => keys["ArrowUp"] = true);
document.getElementById("jump").addEventListener("touchend", () => keys["ArrowUp"] = false);

function loop() {

    if (!gameRunning) return;

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale,0,0,scale,0,0);

    /* CLOUDS */
    for (let c of clouds) {
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.arc(c.x + c.r, c.y + 10, c.r + 10, 0, Math.PI * 2);
        ctx.arc(c.x + c.r*2, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();

        c.x -= 0.3;
        if (c.x < -150) c.x = BASE_W + 200;
    }

    /* BIRDS (UNCHANGED) */
    for (let b of birds) {

        let flap = Math.sin(Date.now()*0.02 + b.f) * 6;

        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 6, 3, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = "#222";
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(b.x - 2, b.y);
        ctx.quadraticCurveTo(b.x - 10, b.y - flap, b.x - 2, b.y + 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(b.x + 2, b.y);
        ctx.quadraticCurveTo(b.x + 10, b.y - flap, b.x + 2, b.y + 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(b.x + 6, b.y - 2, 2, 0, Math.PI*2);
        ctx.fill();

        b.x -= 1.2;
        if (b.x < -50) b.x = BASE_W + 100;
    }

    ctx.fillStyle = "green";
    ctx.fillRect(0, 350, BASE_W, 50);

    /* PLAYER */
    if (keys["ArrowRight"]) player.x += 5;
    if (keys["ArrowLeft"]) player.x -= 5;

    if (keys["ArrowUp"] && player.onGround) {
        player.dy = -12;
        player.onGround = false;
    }

    player.dy += gravity;
    player.y += player.dy;

    if (player.y >= 320) {
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
    }

    /* 🐶 CUTE WALKING PUPPY (NEW ANIMATION) */

    dog.x += (player.x - dog.x - 30) * 0.05;
    dog.y = 320;

    let walk = Math.sin(Date.now()*0.02) * 3;
    let tail = Math.sin(Date.now()*0.05) * 6;
    let bob = Math.sin(Date.now()*0.015) * 2;

    let dx = dog.x;
    let dy = dog.y + bob;

    /* BODY */
    ctx.fillStyle = "#d9d9d9";
    ctx.beginPath();
    ctx.ellipse(dx, dy, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();

    /* HEAD */
    ctx.beginPath();
    ctx.arc(dx + 12, dy - 6 + bob, 7, 0, Math.PI*2);
    ctx.fill();

    /* EAR */
    ctx.beginPath();
    ctx.arc(dx + 14, dy - 12 + bob, 3, 0, Math.PI*2);
    ctx.fill();

    /* LEGS (WALKING) */
    ctx.strokeStyle = "#bbb";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(dx - 6, dy + 8);
    ctx.lineTo(dx - 6, dy + 8 + walk);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(dx - 2, dy + 8);
    ctx.lineTo(dx - 2, dy + 8 - walk);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(dx + 4, dy + 8);
    ctx.lineTo(dx + 4, dy + 8 + walk);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(dx + 8, dy + 8);
    ctx.lineTo(dx + 8, dy + 8 - walk);
    ctx.stroke();

    /* TAIL (WAGGING) */
    ctx.strokeStyle = "#bbb";
    ctx.beginPath();
    ctx.moveTo(dx - 14, dy);
    ctx.quadraticCurveTo(dx - 20, dy - 5 + tail, dx - 22, dy - 2);
    ctx.stroke();

    /* HEARTS */
    hearts.forEach((h, i) => {
        ctx.font = "28px Arial";
        ctx.fillText("❤️", h.x, h.y);

        if (Math.abs(player.x - h.x) < 25 && Math.abs(player.y - h.y) < 25) {
            hearts.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    /* SPIKES (UNCHANGED FIXED COLLISION) */
    spikes.forEach(s => {
        ctx.font = "30px Arial";
        ctx.fillText("💀", s.x, s.y);

        let dx2 = player.x - s.x;
        let dy2 = player.y - s.y;
        let distance = Math.sqrt(dx2*dx2 + dy2*dy2);

        if (distance < 30) {
            gameRunning = false;
            document.getElementById("gameover").style.display = "block";
        }
    });

    ctx.font = "32px Arial";
    ctx.fillText("🎁", goal.x, goal.y);

    if (player.x > goal.x && score >= 5) {
        gameRunning = false;
        document.getElementById("message").style.display = "block";
    }

    /* PRINCESS (UNCHANGED) */

    let bounce = Math.sin(Date.now()*0.015)*2;
    let legMove = Math.sin(Date.now()*0.02)*4;
    let armMove = Math.sin(Date.now()*0.02)*3;
    let hairWave = Math.sin(Date.now()*0.01)*4;

    let px = player.x;
    let py = player.y + bounce;

    ctx.fillStyle = "#3b2a1f";
    ctx.beginPath();
    ctx.moveTo(px+12, py-50);
    ctx.quadraticCurveTo(px-25+hairWave, py-20, px-15, py+35);
    ctx.quadraticCurveTo(px+12, py+50, px+35, py+10);
    ctx.fill();

    ctx.fillStyle = "#ff4fa3";
    ctx.beginPath();
    ctx.moveTo(px+12, py-20);
    ctx.lineTo(px-25, py+30);
    ctx.lineTo(px+45, py+30);
    ctx.fill();

    ctx.fillStyle = "#f5cba7";
    ctx.fillRect(px+6, py-30, 12, 12);

    ctx.beginPath();
    ctx.arc(px+12, py-45, 12, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px+8, py-45, 4, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px+16, py-45, 4, 0, Math.PI*2);
    ctx.stroke();

    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(px+10, py+25);
    ctx.lineTo(px+6-legMove, py+42);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(px+16, py+25);
    ctx.lineTo(px+20+legMove, py+42);
    ctx.stroke();

    requestAnimationFrame(loop);
}

function resetGame() {
    init();
    loop();
}

window.onload = function() {
    initCanvas();
    init();
    loop();
};

</script>

</body>
</html>
